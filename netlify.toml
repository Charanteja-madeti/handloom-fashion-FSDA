[build]
  command = "npm run build --prefix front"
  publish = "front/dist"

[build.environment]
  NODE_VERSION = "20.19.0"

[[redirects]]
  from = "/api/*"
  to = "https://handloom-fashion-fsda.onrender.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
